<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>burrnny · Stream Promo Banner</title>
<!--
  Banner HTML para Browser Source en OBS / Streamlabs.
  Rota cada ~10 segundos entre Klaro y Gravity Sort.

  Vibe: vibrante, alegre, cinematic, gameplay-friendly. Mesh gradient
  animado de fondo + glass blur overlay + partículas flotantes +
  gradient text shimmer + conic ring giratorio en el icon.

  Setup en OBS:
    Sources → + → Browser
    URL: https://burrnny.com/stream/promo.html
    Width: 600 · Height: 160
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 600px;
    height: 160px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: relative;
    width: 600px;
    height: 160px;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     SLIDE: rounded card. Cada slide trae su propio set de blobs
     mesh + glass overlay + content.
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  .slide {
    position: absolute;
    inset: 0;
    border-radius: 32px;
    overflow: hidden;
    background: var(--base, #1A1228);
    box-shadow:
      0 18px 50px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(255, 255, 255, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    opacity: 0;
    transform: translateX(60px) scale(0.96);
    transition:
      opacity 0.75s cubic-bezier(0.2, 0.9, 0.3, 1.1),
      transform 0.75s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }
  .slide.active {
    opacity: 1;
    transform: translateX(0) scale(1);
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━ MESH BACKGROUND BLOBS ━━━━━━━━━━━━━━━━━━━━━━━━
     4 blobs absolute con radial-gradients que drift por la card.
     Cada uno tiene su propio path de animación → mesh "respira". */
  .blob {
    position: absolute;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.85;
    pointer-events: none;
    will-change: transform;
  }
  .blob.b1 { background: var(--c1); top: -120px; left: -60px;  animation: drift1 16s ease-in-out infinite; }
  .blob.b2 { background: var(--c2); top: -100px; right: -90px; animation: drift2 18s ease-in-out infinite; }
  .blob.b3 { background: var(--c3); bottom: -140px; left: 35%; animation: drift3 14s ease-in-out infinite; }
  .blob.b4 { background: var(--c4); top: 30%; left: 30%; width: 200px; height: 200px; opacity: 0.6; animation: drift4 12s ease-in-out infinite; }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(40px, 30px) scale(1.12); }
    66%      { transform: translate(-20px, 50px) scale(0.95); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%      { transform: translate(-60px, 40px) scale(1.18); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) scale(1.05); }
    50%      { transform: translate(40px, -30px) scale(0.9); }
  }
  @keyframes drift4 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50%      { transform: translate(30px, -20px) rotate(180deg); }
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━ GLASS OVERLAY ━━━━━━━━━━━━━━━━━━━━━━━━
     Capa translúcida con backdrop-blur que suaviza el mesh para que
     el texto sea legible. Aporta el "frosted glass" look. */
  .glass {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg,
      rgba(15, 10, 25, 0.30),
      rgba(15, 10, 25, 0.50));
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
  }
  .glass::after {
    /* Vignette sutil en esquinas para más profundidad */
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━ PARTÍCULAS FLOTANTES ━━━━━━━━━━━━━━━━━━━━━━━━
     8 partículas con drift up + twinkle. Variedad de tamaño/color/timing. */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: floatUp var(--dur, 5s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
    filter: blur(0.5px) drop-shadow(0 0 6px var(--color, #FFF));
  }
  @keyframes floatUp {
    0%   { transform: translateY(20px) scale(0.6); opacity: 0; }
    20%  { opacity: 0.9; }
    50%  { transform: translateY(-30px) scale(1.1); opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(-70px) scale(0.4); opacity: 0; }
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━ CONTENT (icon + name + apple) ━━━━━━━━━━━━━━━━━━━━━━━━ */
  .content {
    position: relative;
    z-index: 10;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 0 30px 0 22px;
  }

  /* ━━━━━━━━━━━━━━━━━━━━━━━━ ICON SQUIRCLE + RING + HALO ━━━━━━━━━━━━━━━━━━━━━━━━
     Antes el ring era un círculo perfecto y el icono un rounded-square →
     se veían crescents raros en las esquinas. Ahora:
       1. .icon-halo  — glow radial blureado, pulsa (outer aura)
       2. .icon-ring  — gradient border que SIGUE el squircle del icono
                        gracias a la técnica de mask-composite. El ring
                        gira pero su forma respeta las esquinas redondeadas.
       3. .icon-img   — el squircle del icono encima, con bob animation. */
  .icon-wrap {
    flex-shrink: 0;
    width: 116px;
    height: 116px;
    position: relative;
  }

  /* Outer glow halo: blob radial blureado que pulsa */
  .icon-halo {
    position: absolute;
    inset: -16px;
    border-radius: 34px;
    background: radial-gradient(circle, var(--c1) 0%, transparent 65%);
    filter: blur(10px);
    opacity: 0.55;
    pointer-events: none;
    animation: haloPulse 2.8s ease-in-out infinite;
  }
  @keyframes haloPulse {
    0%, 100% { transform: scale(0.92); opacity: 0.45; }
    50%      { transform: scale(1.08); opacity: 0.75; }
  }

  /* Rotating gradient border que sigue el squircle del icono.
     La magia: `padding` define el grosor del border; el conic-gradient
     fill se aplica al box completo; luego mask-composite resta el
     contenido interno → queda solo el "anillo" siguiendo el border-radius. */
  .icon-ring {
    position: absolute;
    inset: -4px;
    border-radius: 28px;          /* squircle, ligeramente mayor que el del icono (24px) */
    padding: 3px;                  /* grosor del border ring */
    background: conic-gradient(from 0deg,
      var(--c1) 0%,
      var(--c2) 22%,
      var(--c3) 44%,
      var(--c4) 66%,
      var(--c1) 100%);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box,
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: spin 6s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 6px var(--c1));
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .icon-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 24px;          /* squircle iOS-style */
    object-fit: cover;
    box-shadow:
      0 10px 24px rgba(0, 0, 0, 0.55),
      inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    animation: bob 3s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  /* Name con gradient text shimmer */
  .name {
    flex: 1;
    text-align: center;
    font-size: 46px;
    font-weight: 900;
    letter-spacing: -1.6px;
    line-height: 1;
    background: linear-gradient(100deg,
      var(--c2) 0%,
      #FFFFFF 40%,
      var(--c1) 60%,
      var(--c3) 100%);
    background-size: 250% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s ease-in-out infinite;
    text-shadow: 0 0 1px rgba(255, 255, 255, 0.1);
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.45));
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* Apple logo con pulse halo */
  .apple-wrap {
    flex-shrink: 0;
    position: relative;
    width: 60px;
    height: 60px;
    display: grid;
    place-items: center;
  }
  .apple-halo {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--c1) 0%, transparent 65%);
    opacity: 0.5;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(0.85); opacity: 0.35; }
    50%      { transform: scale(1.15); opacity: 0.75; }
  }
  .apple-mark {
    width: 48px;
    height: 48px;
    fill: white;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 0 8px var(--c1));
  }
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // Config
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const ROTATION_MS = 10000;

  // Cada slide trae paleta completa: c1..c4 para el mesh + base oscura.
  // c1 = accent primario, c2 = secundario, c3 = warm pop, c4 = soft fill.
  const slides = [
    {
      name: "Klaro",
      icon: "https://burrnny.com/klaro/icon.png",
      base: "#1A1228",
      c1: "#8B82E8",        // purple primario
      c2: "#C084FC",        // light purple
      c3: "#F0A830",        // amber warm
      c4: "#E66B47",        // coral pop
      particles: ["#C084FC", "#F0A830", "#8B82E8", "#FFFFFF"]
    },
    {
      name: "Gravity Sort",
      icon: "https://burrnny.com/gravitysort/icon.png",
      base: "#0E2420",
      c1: "#2DB88A",        // teal primario
      c2: "#4ECDC4",        // cyan
      c3: "#F9C74F",        // warm yellow
      c4: "#F4A261",        // soft orange
      particles: ["#4ECDC4", "#F9C74F", "#2DB88A", "#FFFFFF"]
    }
  ];

  // Apple SVG glyph — el de App Store oficial.
  const APPLE_SVG = '<svg class="apple-mark" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>';

  // Genera N partículas con posiciones/tiempos/colores aleatorios pero
  // determinísticos por slide (seed simple para que se repita igual).
  function buildParticles(palette, count = 8) {
    let html = '';
    for (let i = 0; i < count; i++) {
      const left = 8 + (i * 73) % 84;       // % del width
      const top  = 50 + (i * 31) % 50;      // % del height (parte baja)
      const size = 4 + (i * 13) % 8;        // 4..12 px
      const dur  = 4 + (i * 17) % 5;        // 4..9 s
      const delay = (i * 0.7) % 6;          // 0..6 s
      const color = palette[i % palette.length];
      html += `<span class="particle" style="
        left:${left}%; top:${top}%;
        width:${size}px; height:${size}px;
        background:${color};
        --color:${color};
        --dur:${dur}s;
        --delay:${delay}s;
      "></span>`;
    }
    return html;
  }

  const stage = document.getElementById('stage');
  let currentIndex = 0;

  const slideNodes = slides.map((s) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.style.setProperty('--base', s.base);
    el.style.setProperty('--c1', s.c1);
    el.style.setProperty('--c2', s.c2);
    el.style.setProperty('--c3', s.c3);
    el.style.setProperty('--c4', s.c4);
    el.innerHTML = `
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
      <div class="glass"></div>
      ${buildParticles(s.particles)}
      <div class="content">
        <div class="icon-wrap">
          <div class="icon-halo"></div>
          <div class="icon-ring"></div>
          <img class="icon-img" src="${s.icon}" alt="${s.name}">
        </div>
        <div class="name">${s.name}</div>
        <div class="apple-wrap">
          <div class="apple-halo"></div>
          ${APPLE_SVG}
        </div>
      </div>
    `;
    stage.appendChild(el);
    return el;
  });

  function showSlide(index) {
    slideNodes.forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
  }

  showSlide(0);
  setInterval(() => {
    currentIndex = (currentIndex + 1) % slides.length;
    showSlide(currentIndex);
  }, ROTATION_MS);
</script>
</body>
</html>
