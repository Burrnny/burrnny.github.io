<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>burrnny · Stream Promo Banner</title>
<!--
  Banner HTML para Browser Source en OBS / Streamlabs.
  Rota cada ~9 segundos entre Klaro y Gravity Sort.
  Solo 3 elementos grandes: icon + name + Apple logo. Sin texto extra.

  Setup en OBS:
    Sources → + → Browser
    URL: https://burrnny.com/stream/promo.html
    Width: 600 · Height: 140
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 600px;
    height: 140px;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: relative;
    width: 600px;
    height: 140px;
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 0 28px 0 18px;
    border-radius: 28px;
    background:
      linear-gradient(135deg, rgba(38, 38, 44, 0.94), rgba(22, 22, 26, 0.96));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 12px 40px rgba(0, 0, 0, 0.55),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.65s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }
  .slide.active {
    opacity: 1;
    transform: translateX(0);
  }
  /* Halo radial sutil con el accent color de cada app */
  .slide::after {
    content: "";
    position: absolute;
    right: -80px; top: -80px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent, #8B82E8) 0%, transparent 60%);
    opacity: 0.13;
    pointer-events: none;
  }

  /* Bloque izquierdo: icono grande con halo glow */
  .icon-wrap {
    flex-shrink: 0;
    width: 108px;
    height: 108px;
    border-radius: 26px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 8px 24px rgba(0, 0, 0, 0.55),
      inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  }
  .icon-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .icon-glow {
    position: absolute;
    inset: -8px;
    border-radius: 32px;
    box-shadow: 0 0 32px var(--accent, #8B82E8);
    opacity: 0.55;
    pointer-events: none;
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.40; }
    50%      { opacity: 0.75; }
  }

  /* Nombre — el elemento dominante centralmente */
  .name {
    flex: 1;
    text-align: center;
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -1.5px;
    color: #F0F0F4;
    line-height: 1;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  }

  /* Apple logo a la derecha, grande, en color accent */
  .apple-mark {
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    color: var(--accent, #8B82E8);
    filter: drop-shadow(0 0 12px var(--accent, #8B82E8));
    opacity: 0.95;
  }
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // Config — modifica acá si querés ajustar timing/copy
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const ROTATION_MS = 9000; // 9 segundos por slide

  const slides = [
    {
      name: "Klaro",
      icon: "https://burrnny.com/klaro/icon.png",
      accent: "#8B82E8"          // purple Klaro
    },
    {
      name: "Gravity Sort",
      icon: "https://burrnny.com/gravitysort/icon.png",
      accent: "#2DB88A"          // teal Gravity
    }
  ];

  // SVG path de la manzana Apple — el mismo glyph que aparece en App Store.
  const APPLE_SVG = '<svg class="apple-mark" viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>';

  const stage = document.getElementById('stage');
  let currentIndex = 0;

  // Pre-crear los nodos de slides — más eficiente que recrear cada rotación.
  const slideNodes = slides.map((slide) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.style.setProperty('--accent', slide.accent);
    el.innerHTML = `
      <div class="icon-wrap">
        <div class="icon-glow"></div>
        <img src="${slide.icon}" alt="${slide.name}">
      </div>
      <div class="name">${slide.name}</div>
      ${APPLE_SVG}
    `;
    stage.appendChild(el);
    return el;
  });

  function showSlide(index) {
    slideNodes.forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
  }

  showSlide(0);
  setInterval(() => {
    currentIndex = (currentIndex + 1) % slides.length;
    showSlide(currentIndex);
  }, ROTATION_MS);
</script>
</body>
</html>
